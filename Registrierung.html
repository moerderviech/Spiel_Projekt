    <style> 
    
        @font-face {
            font-family: 'TastyCheese';

            }

         @font-face {
            font-family: 'NewCheese';

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(to right, #000000, #24153e);
            overflow: hidden;
            /*cursor: none; /*normalen Cursor ausblenden */
            display: flex;
            justify-content: center;   /* horizontal zentrieren */
            align-items: center;       /* vertikal zentrieren */
            height: 100vh;             /* ganze Bildschirmhöhe */
            font-family: Aria l, sans-serif;
            }
        .container {
            
            text-align: center;
            display: block;
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle at center, 
            rgba(255,255,200,0.9) 0%, 
            rgba(255,255,200,0.4) 20%, 
            rgba(0,0,0,0.9) 70%);
            background-color:hsla(0, 0%, 100%, 0.068);        
            /*border: 2px solid rgb(218, 200, 245);  */
            padding: 40px;
            border-radius: 10px;    
            box-shadow: 0 15px 30px rgb(255, 255, 255); 
            }   

          .cheese-button {
    position: relative;
    background: linear-gradient(145deg, #ffd84d, #ffcc00);
    border: none;
    padding: 20px 50px;
    font-size: 20px;
    font-weight: bold;
    color: #5a4a00;
    border-radius: 20px;
    cursor: pointer;
    overflow: hidden; /* wichtig für layering */
  }

  /* Text nach vorne */
  .cheese-text {
    position: relative;
    z-index: 2;
  }

  /* Käselöcher nach hinten */
  .cheese-button::before,
  .cheese-button::after,
  .hole {
    z-index: 1;
  }

  .cheese-button::before,
  .cheese-button::after {
    content: "";
    position: absolute;
    background: #e6b800;
    border-radius: 50%;
    box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
  }

  .cheese-button::before {
    width: 25px;
    height: 25px;
    top: 10px;
    left: 20px;
  }

  .cheese-button::after {
    width: 15px;
    height: 15px;
    bottom: 10px;
    right: 25px;
  }

  .hole {
    position: absolute;
    background: #e6b800;
    border-radius: 50%;
    box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
  }

  .hole1 {
    width: 18px;
    height: 18px;
    top: 50%;
    left: 40%;
    transform: translate(-50%, -50%);
  }

  .hole2 {
    width: 12px;
    height: 12px;
    top: 30%;
    right: 20%;
  }

  /* Hover Effekt */
  .cheese-button:hover {
    transform: scale(1.05) rotate(-1deg);
  }

  .cheese-button:active {
    transform: scale(0.95);
    box-shadow: inset 5px 5px 10px rgba(0,0,0,0.3);
  }


    </style>
    
</head>

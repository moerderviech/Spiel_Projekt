     .cheese-button {
    position: relative;
    background: linear-gradient(145deg, #ffd84d, #ffcc00);
    border: none;
    font-weight: bold;
    color: #5a4a00;
    box-shadow: #090909;
    border-radius: 20px;
    cursor: pointer;
    overflow: hidden; /* wichtig für layering */
  }

  /* Text nach vorne */
  .cheese-text {
    position: relative;
    z-index: 2;
  }

  /* Käselöcher nach hinten */
  .cheese-button::before,
  .cheese-button::after,
  .hole {
    z-index: 1;
  }

  .cheese-button::before,
  .cheese-button::after {
    content: "";
    position: absolute;
    background: #e6b800;
    border-radius: 50%;
    box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
  }

  .cheese-button::before {
    width: 25px;
    height: 25px;
    top: 10px;
    left: 20px;
  }

  .cheese-button::after {
    width: 15px;
    height: 15px;
    bottom: 10px;
    right: 25px;
  }

  .hole {
    position: absolute;
    background: #e6b800;
    border-radius: 50%;
    box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
  }

  .hole1 {
    width: 18px;
    height: 18px;
    top: 50%;
    left: 40%;
    transform: translate(-50%, -50%);
  }

  .hole2 {
    width: 12px;
    height: 12px;
    top: 30%;
    right: 20%;
  }

  /* Hover Effekt */
  .cheese-button:hover {
    transform: scale(1.05) rotate(-1deg);
  }

  .cheese-button:active {
    transform: scale(0.95);
    box-shadow: inset 5px 5px 10px rgba(0,0,0,0.3);
  }

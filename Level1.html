<!DOCTYPE html>
<html lang="de"> 
<head>
<meta charset="UTF-8">
<title>Level 1</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Fehlermeldung */
.container {
  position: absolute;
  bottom: 325px;
  left: 1050px;
}

.meldung {
  display: none;
  color: red;
}
</style>

<script>
function falsch() {
  let m = document.getElementById("meldung");

  m.innerText = "Falsch!";
  m.style.display = "block";

  setTimeout(() => {
    m.style.display = "none";
  }, 2000);
}
</script>

</head>

<body>

<div class="container">
  <p id="meldung" class="meldung"></p>
</div>

<h1>Finde den richtigen Button!</h1>

<!-- Falsche Buttons -->
<button onclick="falsch()" style="position:absolute; bottom:100px; left:200px;">
  weiter
</button>

<button onclick="falsch()" style="position:absolute; bottom:200px; left:400px;">
  weiter
</button>

<button onclick="falsch()" style="position:absolute; bottom:300px; left:600px;">
  weiter
</button>

<!-- Richtiger Button -->
<button onclick="window.location.href='/richtig'" 
style="position:absolute; bottom:400px; left:800px;">
  weiter
</button>

</body>
</html>

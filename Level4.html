<!DOCTYPE html>

<title>Level 4</title>

<style>

body {
margin: 0;
height: 100vh;

overflow: hidden;
display: flex;
justify-content: center;   /* horizontal zentrieren */

/*height: 100vh;             /* ganze Bildschirmhöhe */
font-family: Aria l, sans-serif;
        }

</style>

</head>

<body>

<center>
<h1 style="border: 2px solid black; padding: 15px;">Stelle die richtige Zahl ein!</h1>

<!--Regler von 1-100, steht anfangs auf 50-->
<input type="range" min="1" max="100" value="50" style="margin-top:20px;">
<p>Wert: <span id="wert">50</span></p>

<!--Aktuellen Wert anzeigen-->
<script>
const regler = document.getElementById("regler");
const wert = document.getElementById("wert");

regler.oninput = function() {
  wert.textContent = this.value;
}
</script>

</center>

</body>

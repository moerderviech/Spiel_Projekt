<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<title>Anmeldung</title>

<style>

/*Schriftarten*/
@font-face {
  font-family: 'TastyCheese';
  src: url('fonts/tastycheese-bitmaps.otf') format('opentype');
}

@font-face {
  font-family: 'NewCheese';
  src: url('fonts/New Cheese Font/NewCheese.otf') format('opentype');
}

/*Hintergrund / Body*/
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(to right, #000000, #24153e);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

/*Hauptcontainer*/
.container {
  text-align: center;
  width: 100%;
  height: 100vh;
  background: radial-gradient(circle at center, 
    rgba(255,255,200,0.9) 0%, 
    rgba(255,255,200,0.4) 20%, 
    rgba(0,0,0,0.9) 70%);
  padding: 40px;
  border-radius: 10px;    
  box-shadow: 0 15px 30px rgb(255, 255, 255); 
}

/*Titel*/
h2 {
  font-family: 'TastyCheese';
  font-size: 60px;
  position: absolute;
  top: 210px;
  right: 748px;
}

/*Login-Felder*/
.login-fields {
  position: absolute;
  top: 375px;
  right: 684px;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

/*Label + Input*/
.form-group {
  display: flex;
  align-items: center;
  gap: 20px;
}

label {
  font-family: 'NewCheese';
  color: #5a4a00;
  width: 140px;
}

/*Eingabefelder*/
.cheese-input {
  background: linear-gradient(145deg, #ffd84d, #ffcc00);
  border: none;
  border-radius: 15px;
  padding: 10px 15px;
  color: #5a4a00;
  font-weight: bold;
  width: 100px;
}

/*Button*/
.cheese-button {
  position: absolute;
  top: 550px;
  right: 675px;
  background: linear-gradient(145deg, #ffd84d, #ffcc00);
  border: none;
  padding: 20px 50px;
  font-size: 20px;
  font-family: 'NewCheese';
  border-radius: 20px;
  cursor: pointer;
}

/*Link zur Registrierung*/
a {
  font-family: 'NewCheese';
  font-size: 13px;
  position: absolute;
  top: 594px;
  right: 885px;
  color: rgb(167, 124, 22);
}

</style>

</head>

<body>

<!--Bild Ratte-->
<img src="ratte.png" alt="Sticker"
     style="position: absolute; top: 70px; right: 210px; width: 800px;">

<div class="container">

  <h2>LOGIN:</h2>
  <br> <br> <br>

  <!--Fehlermeldung anzeigen wenn User falsche Anmeldedaten eingibt-->
{% if fehler %}
  <p style="color: red; font-weight: bold; position: absolute; top: 300px; right: 700px;">
    {{ fehler }}
  </p>
{% endif %}

  <!-- FORMULAR START -->
  <!-- Alles innerhalb dieses Formulars wird an Flask gesendet -->
  <form method="POST" action="{{ url_for('anmeldung') }}">

    <div class="login-fields">

      <!--Benutzername-->
      <div class="form-group">
        <label>Benutzername:</label>
        <div class="input-wrapper">
          <input class="cheese-input" 
                 type="text" 
                 name="username" 
                 placeholder="Name" 
                 required>
        </div>
      </div>

      <!--Passwort-->
      <div class="form-group">
        <label>Passwort:</label>
        <div class="input-wrapper">
          <input class="cheese-input" 
                 type="password" 
                 name="password" 
                 placeholder="Passwort" 
                 required>
        </div>
      </div>

    </div>

    <!--Login Button-->
    <!--type="submit" sorgt dafür, dass das Formular abgeschickt wird-->
    <button class="cheese-button" type="submit">
      <span class="cheese-text">Weiter</span>
    </button>

  </form>
  <!-- FORMULAR ENDE -->



  <!-- Link zur Registrierung -->
  <!-- Flask kümmert sich um die richtige Seite -->
  <a href="{{ url_for('registrierung') }}">Registrieren</a>

</div>

</body>
</html>

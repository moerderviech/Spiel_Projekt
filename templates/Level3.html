<!DOCTYPE html>
<html lang="de">
<meta charset="UTF-8">
 
<head>

<title>Level 4</title>
 
    <style>
 
        .container {
            text-align: center;
        }
 
        /* 2x2 Grid für die Bilder */
        .bilder-grid {
            display: grid;
            grid-template-columns: repeat(2, 150px);
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }
 
        .bilder-grid img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border: 2px solid black;
            border-radius: 10px;
        }
 
        /* Eingabefelder */
        input[type="text"] {
            width: 35px;
            height: 35px;
            text-align: center;
            font-size: 20px;
            margin: 2px;
        }
 
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
 
        .fehler {
            color: rgb(0, 0, 0);
            margin-top: 10px;
        }


        /* Schriftarten */
        @font-face {
        font-family: 'TastyCheese';
        src: url('fonts/tastycheese-bitmaps.otf') format('opentype');
        }
        @font-face {
        font-family: 'NewCheese';
        src: url('fonts/New Cheese Font/NewCheese.otf') format('opentype');
        }

        /* Body */
        body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(to right, #000000, #24153e);
        overflow: visible;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        }

        /* Container */
        .container {
        text-align: center;
        width: 100%;
        height: 100vh;
        background: radial-gradient(circle at center, 
            rgba(255,255,200,0.9) 0%, 
            rgba(255,255,200,0.4) 20%, 
            rgba(0,0,0,0.9) 70%);
        background-color: hsla(0, 0%, 100%, 0.068);        
        padding: 40px;
        border-radius: 10px;    
        box-shadow: 0 15px 30px rgb(255, 255, 255);
        }

    </style>

</head>
 
<body>
 
<div class="container">
 
    <h1>Finde das richtige Wort:</h1>
 
    <form method="POST">
 
<!--Bilder -->
<div class="bilder-grid">
<img src="{{ url_for('static', filename='bild_9.jpg') }}">
<img src="{{ url_for('static', filename='bild_10.jpg') }}">
<img src="{{ url_for('static', filename='bild_11.jpg') }}">
<img src="{{ url_for('static', filename='bild_12.jpg') }}">
</div>

<!--Eingabefelder -->
<div>
<input type="text" name="buchstabe" maxlength="1">
<input type="text" name="buchstabe" maxlength="1">
<input type="text" name="buchstabe" maxlength="1">
<input type="text" name="buchstabe" maxlength="1">
<input type="text" name="buchstabe" maxlength="1">
<input type="text" name="buchstabe" maxlength="1">
<input type="text" name="buchstabe" maxlength="1">
<input type="text" name="buchstabe" maxlength="1">

 
<br><br>
 
<input type="text" name="buchstabe" maxlength="1">
<input type="text" name="buchstabe" maxlength="1">
<input type="text" name="buchstabe" maxlength="1">
<input type="text" name="buchstabe" maxlength="1">
<input type="text" name="buchstabe" maxlength="1">
<input type="text" name="buchstabe" maxlength="1">
</div>

<!--Button Lösung prüfen-->
<button type="submit">Lösung prüfen</button>
 
    </form>
 
    <!--Fehlermeldung -->
    {% if fehler %}
<p class="fehler">{{ fehler }}</p>

    {% endif %}
 
</div>
 
<!--Flask springt automatisch weiter-->
<script>

    const inputs = document.querySelectorAll('input[name="buchstabe"]');
    inputs.forEach((input, index) => {
        input.addEventListener("input", () => {
            if (input.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });
    });
</script>
 
</body>

</html>

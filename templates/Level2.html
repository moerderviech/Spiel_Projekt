<!DOCTYPE html>
<html lang="de">
<meta charset="UTF-8">
 
<head>

    <title>Level 2</title>
 
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, 
                rgba(255,255,200,0.9) 0%, 
                rgba(255,255,200,0.4) 20%, 
                rgba(0,0,0,0.9) 70%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            }
    </style>
</head>
 
<body>
 
    <center>
<h1 style="border: 2px solid black; padding: 15px;">Stelle die richtige Zahl ein!</h1>
 
        <form method="POST">
<!-- Regler -->
<input type="range" id="regler" name="regler" min="1" max="100" value="50" style="margin-top:20px;">
 
            <p>Wert: <span id="wert">50</span></p>
            <button type="submit">Prüfen</button>
            <input type="hidden" name="clicks" id="clicks">
</form>
 
        {% if fehler %}
<p style="color:red;">{{ fehler }}</p>
        {% endif %}
</center>
 

    <script>
        const regler = document.getElementById("regler");
        const wert = document.getElementById("wert");
 
        regler.oninput = function () {
            wert.textContent = this.value;
        }
        
        <!-- Click Counter -->

    </script>
 

</body>
</html>

<!DOCTYPE html>
<html lang="de"> 
<head>
<meta charset="UTF-8">
<title>Level 1</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, 
    rgba(255,255,200,0.9) 0%, 
    rgba(255,255,200,0.4) 20%, 
    rgba(0,0,0,0.9) 70%);
  overflow: hidden;
}

/* Popup */
#popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 30px;
  border: 3px solid black;
  border-radius: 10px;
  z-index: 1000;
  text-align: center;
}
</style>

</head>

<body>

<h1 style="position:absolute; top:40px; left:50%; transform:translateX(-50%);">
Finde den richtigen Button!
</h1>

<!--Popup-->
<div id="popup">
  <p>Falsch!</p>
  <button onclick="closePopup()">OK</button>
</div>

<!--falsche Buttons-->
<button onclick="falsch()" style="position:absolute; bottom:50px; left:100px;">nein, hier!</button>
<button onclick="falsch()" style="position:absolute; bottom:120px; left:300px;">weiter</button>
<button onclick="falsch()" style="position:absolute; bottom:200px; left:500px;">weiter</button>
<button onclick="falsch()" style="position:absolute; bottom:300px; left:700px;">weiter</button>
<button onclick="falsch()" style="position:absolute; bottom:400px; left:900px;">weiter</button>
<button onclick="falsch()" style="position:absolute; bottom:500px; left:200px;">weiter</button>
<button onclick="falsch()" style="position:absolute; bottom:600px; left:400px;">weiter</button>
<button onclick="falsch()" style="position:absolute; bottom:150px; left:800px;">weiter</button>
<button onclick="falsch()" style="position:absolute; bottom:250px; left:100px;">weiter</button>
<button onclick="falsch()" style="position:absolute; bottom:350px; left:300px;">weiter</button>
<button onclick="falsch()" style="position:absolute; bottom:450px; left:600px;">hier!</button>
<button onclick="falsch()" style="position:absolute; bottom:550px; left:850px;">weiter</button>
<button onclick="falsch()" style="position:absolute; bottom:650px; left:150px;">weiter</button>
<button onclick="falsch()" style="position:absolute; bottom:700px; left:500px;">weiter</button>
<button onclick="falsch()" style="position:absolute; bottom:100px; left:1000px;">weiter</button>

<!--RICHTIGER Button-->
<button id="richtigerButton"
style="position:absolute; bottom:500px; left:1100px;">
weiter
</button>

<script>
  function falsch() {
  let p = document.getElementById("popup");
  p.style.display = "block";

  setTimeout(() => {
    p.style.display = "none";
  }, 1500);
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
  
let click_count = 0;

document.addEventListener("click", function(event)
{
  click_count++;
})

document.getElementById("richtigerButton").addEventListener("click", function(e) 
{
  window.location.href = `/richtig?clicks=${click_count}`
})
</script>
</body>
</html>
